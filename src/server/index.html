<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIG Capstone G6</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --surface: #1a1a1a;
    --border: #2e2e2e;
    --accent: #e8ff47;
    --text: #e0e0e0;
    --muted: #555;
    --font-mono: 'IBM Plex Mono', monospace;
    --font-sans: 'IBM Plex Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  header {
    text-align: center;
    margin-bottom: 3rem;
  }

  header h1 {
    font-family: var(--font-mono);
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
  }

  header p {
    margin-top: 0.5rem;
    font-size: 0.85rem;
    color: var(--muted);
    font-weight: 300;
  }

  .card {
    width: 100%;
    max-width: 560px;
    background: var(--surface);
    border: 1px solid var(--border);
  }

  /* Drop zone */
  #drop-zone {
    padding: 3rem 2rem;
    text-align: center;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }

  #drop-zone:hover, #drop-zone.drag-over {
    background: #222;
  }

  #drop-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  #drop-zone .icon {
    font-size: 2rem;
    margin-bottom: 1rem;
    color: var(--muted);
  }

  #drop-zone p {
    font-family: var(--font-mono);
    font-size: 0.8rem;
    color: var(--muted);
  }

  #drop-zone p span {
    color: var(--accent);
  }

  /* Preview */
  #preview-wrap {
    display: none;
    padding: 1rem;
    border-bottom: 1px solid var(--border);
    background: #111;
  }

  #preview-wrap img {
    max-width: 100%;
    max-height: 220px;
    display: block;
    margin: 0 auto;
  }

  /* Submit button */
  #submit-btn {
    display: block;
    width: 100%;
    padding: 1rem;
    background: var(--accent);
    color: #0e0e0e;
    font-family: var(--font-mono);
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  #submit-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  #submit-btn:not(:disabled):hover { opacity: 0.85; }

  /* Output */
  #output {
    display: none;
    padding: 1.5rem;
    border-top: 1px solid var(--border);
  }

  #output label {
    display: block;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.75rem;
  }

  #result-text {
    font-family: var(--font-mono);
    font-size: 0.9rem;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--text);
  }

  #result-text.error { color: #ff6b6b; }

  /* Spinner */
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid #0e0e0e;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 0.5rem;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <h1>AIG Capstone - Group 6</h1>
  <p>Upload an image — get text back.</p>
</header>

<div class="card">

  <div id="drop-zone">
    <input type="file" id="file-input" accept="image/*">
    <div class="icon">⬆</div>
    <p>Drop an image here or <span>browse</span></p>
  </div>

  <div id="preview-wrap">
    <img id="preview-img" src="" alt="Preview">
  </div>

  <button id="submit-btn" disabled>Extract Text</button>

  <div id="output">
    <label>Result</label>
    <div id="result-text"></div>
  </div>

</div>

<script>
  const fileInput   = document.getElementById("file-input");
  const dropZone    = document.getElementById("drop-zone");
  const previewWrap = document.getElementById("preview-wrap");
  const previewImg  = document.getElementById("preview-img");
  const submitBtn   = document.getElementById("submit-btn");
  const output      = document.getElementById("output");
  const resultText  = document.getElementById("result-text");

  // --- File selected via input or drop ---
  fileInput.addEventListener("change", () => showPreview(fileInput.files[0]));

  dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("drag-over"); });
  dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag-over"));
  dropZone.addEventListener("drop", e => {
    e.preventDefault();
    dropZone.classList.remove("drag-over");
    const file = e.dataTransfer.files[0];
    if (file) showPreview(file);
  });

  function showPreview(file) {
    if (!file) return;
    previewImg.src = URL.createObjectURL(file);
    previewWrap.style.display = "block";
    submitBtn.disabled = false;
    output.style.display = "none";
    resultText.textContent = "";
  }

  // --- Submit ---
  submitBtn.addEventListener("click", async () => {
    const file = fileInput.files[0] || null;
    if (!file) return;

    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner"></span>Extracting…';
    output.style.display = "none";

    const form = new FormData();
    form.append("file", file);

    try {
      const res = await fetch(`/ocr`, { method: "POST", body: form });
      const data = await res.json();

      resultText.className = "";
      resultText.textContent = res.ok
        ? (data.text || "(no text detected)")
        : (data.detail || "Server error");
      if (!res.ok) resultText.className = "error";

    } catch (err) {
      resultText.className = "error";
      resultText.textContent = "Could not reach the server.\nIs it running at " + SERVER + "?";
    }

    output.style.display = "block";
    submitBtn.innerHTML = "Extract Text";
    submitBtn.disabled = false;
  });
</script>

</body>
</html>
